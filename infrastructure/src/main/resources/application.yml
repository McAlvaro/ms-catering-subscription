server:
  port: 8080

spring:
  application:
    name: ms-catering-subscription

  # ── MySQL ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://127.0.0.1:3325/ms_catering_subscription?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: admin_db
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none # Liquibase controla el esquema, Hibernate no modifica nada
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Liquibase ──────────────────────────────────────────────────────
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

# ── Swagger / SpringDoc ──────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
