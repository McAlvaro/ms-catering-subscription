databaseChangeLog:
  - changeSet:
      id: 1.0-create-consolidated-lines
      author: alvaro
      changes:
        - createTable:
            tableName: consolidated_lines
            columns:
              - column:
                  name: id
                  type: binary(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: calendar_id
                  type: binary(16)
                  constraints:
                    nullable: false
              - column:
                  name: subscription_id
                  type: binary(16)
                  constraints:
                    nullable: false
              - column:
                  name: patient_id
                  type: binary(16)
                  constraints:
                    nullable: false
              - column:
                  name: diet_plan_id
                  type: binary(16)
                  constraints:
                    nullable: false
              - column:
                  name: service_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: address_street
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: address_number
                  type: varchar(50)
              - column:
                  name: address_city
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: address_reference
                  type: varchar(255)
              - column:
                  name: address_latitude
                  type: double
              - column:
                  name: address_longitude
                  type: double
              - column:
                  name: address_phone
                  type: varchar(50)
              - column:
                  name: time_start
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: time_end
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: instructions
                  type: varchar(255)
        - addForeignKeyConstraint:
            baseTableName: consolidated_lines
            baseColumnNames: calendar_id
            referencedTableName: consolidated_calendars
            referencedColumnNames: id
            constraintName: fk_cons_line_calendar
            onDelete: CASCADE
