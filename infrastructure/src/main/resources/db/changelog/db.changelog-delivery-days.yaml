databaseChangeLog:
  - changeSet:
      id: 1.0-create-delivery-days
      author: alvaro
      changes:
        - createTable:
            tableName: delivery_days
            columns:
              - column:
                  name: id
                  type: binary(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: calendar_id
                  type: binary(16)
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: address_street
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: address_number
                  type: varchar(50)
              - column:
                  name: address_city
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: address_reference
                  type: varchar(255)
              - column:
                  name: address_latitude
                  type: double
              - column:
                  name: address_longitude
                  type: double
              - column:
                  name: address_phone
                  type: varchar(50)
              - column:
                  name: time_start
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: time_end
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: instructions
                  type: varchar(255)
              - column:
                  name: consolidated_at
                  type: datetime
              - column:
                  name: delivered_at
                  type: datetime
              - column:
                  name: failure_reason
                  type: varchar(255)
        - addForeignKeyConstraint:
            baseTableName: delivery_days
            baseColumnNames: calendar_id
            referencedTableName: delivery_calendars
            referencedColumnNames: id
            constraintName: fk_del_day_calendar
            onDelete: CASCADE
